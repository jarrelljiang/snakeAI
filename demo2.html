<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>随机安全贪吃蛇 AI Demo</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
            background: #151816;
            color: #f3f7e9;
            font-family: "Microsoft YaHei", "Segoe UI", sans-serif;
        }

        body {
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .shell {
            width: min(980px, 100%);
        }

        .topbar {
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: end;
            gap: 18px;
            margin-bottom: 14px;
        }

        h1 {
            margin: 0 0 8px;
            color: #f7d26a;
            font-size: 28px;
            letter-spacing: 0;
        }

        .sub {
            margin: 0;
            color: #aab8a1;
            font-size: 14px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, minmax(90px, 1fr));
            gap: 10px;
            margin-bottom: 12px;
        }

        .stat {
            border: 1px solid rgba(247, 210, 106, 0.28);
            background: rgba(255, 255, 255, 0.06);
            padding: 10px 12px;
            border-radius: 8px;
        }

        .label {
            color: #93a38d;
            display: block;
            font-size: 12px;
            margin-bottom: 4px;
        }

        .value {
            color: #f7d26a;
            font-size: 22px;
            font-weight: 700;
        }

        canvas {
            display: block;
            width: 100%;
            max-width: 900px;
            aspect-ratio: 2 / 1;
            border: 1px solid rgba(247, 210, 106, 0.35);
            border-radius: 8px;
            background: #1f2b20;
            box-shadow: 0 18px 42px rgba(0, 0, 0, 0.38);
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 14px;
        }

        button {
            border: 1px solid rgba(247, 210, 106, 0.45);
            background: #f7d26a;
            color: #1c1f1b;
            min-height: 38px;
            padding: 0 14px;
            border-radius: 7px;
            font-weight: 700;
            cursor: pointer;
        }

        button.secondary {
            background: transparent;
            color: #f7d26a;
        }

        .note {
            margin: 12px 0 0;
            color: #93a38d;
            font-size: 13px;
            line-height: 1.7;
        }
    </style>
</head>
<body>
    <main class="shell">
        <div class="topbar">
            <div>
                <h1>随机安全贪吃蛇 AI</h1>
                <p class="sub">20 * 10 地图，哈密顿安全兜底 + 随机智能捷径。</p>
            </div>
            <div class="actions">
                <button id="toggle">暂停</button>
                <button id="restart" class="secondary">重新开始</button>
            </div>
        </div>

        <section class="stats">
            <div class="stat"><span class="label">移动步数</span><span class="value" id="steps">0</span></div>
            <div class="stat"><span class="label">蛇身长度</span><span class="value" id="length">5</span></div>
            <div class="stat"><span class="label">当前策略</span><span class="value" id="strategy">-</span></div>
            <div class="stat"><span class="label">完成度</span><span class="value" id="progress">3%</span></div>
        </section>

        <canvas id="board" width="900" height="450"></canvas>
        <p class="note">
            AI 会先生成多条到食物的完整候选路线，模拟吃到食物后的逃生空间，再按“步数更短、安全空间、转向变化、随机扰动”加权选择；哈密顿环只作为兜底安全路线。
        </p>
    </main>

    <script>
        const COLS = 20;
        const ROWS = 10;
        const TOTAL = COLS * ROWS;
        const TICK_MS = 20;
        const START_LENGTH = 5;
        const PLAN_ATTEMPTS = 8;
        const MAX_SEARCH_NODES = 260;
        const MAX_PLAN_CANDIDATES = 6;

        const canvas = document.getElementById('board');
        const ctx = canvas.getContext('2d');
        const stepsEl = document.getElementById('steps');
        const lengthEl = document.getElementById('length');
        const strategyEl = document.getElementById('strategy');
        const progressEl = document.getElementById('progress');
        const toggleBtn = document.getElementById('toggle');
        const restartBtn = document.getElementById('restart');

        let cycle = [];
        let order = [];
        let snake = [];
        let food = null;
        let steps = 0;
        let timer = null;
        let running = true;
        let finished = false;
        let lastStrategy = 'cycle';
        let lastDirection = null;
        let recentHeads = [];
        let activePlan = [];
        let plannedFoodKey = '';
        let planRetryStep = 0;

        // 生成 20*10 地图上的哈密顿环，作为安全移动的序号系统。
        function buildHamiltonianCycle() {
            const result = [];
            for (let x = 0; x < COLS; x++) {
                result.push({ x, y: 0 });
            }
            for (let y = 1; y < ROWS; y++) {
                if (y % 2 === 1) {
                    for (let x = COLS - 1; x >= 1; x--) result.push({ x, y });
                } else {
                    for (let x = 1; x < COLS; x++) result.push({ x, y });
                }
            }
            for (let y = ROWS - 1; y >= 1; y--) {
                result.push({ x: 0, y });
            }
            return result;
        }

        // 建立每个格子到哈密顿环序号的反向索引。
        function buildOrderMap(path) {
            const map = Array.from({ length: ROWS }, () => Array(COLS).fill(-1));
            path.forEach((point, index) => {
                map[point.y][point.x] = index;
            });
            return map;
        }

        // 初始化一局游戏，蛇身沿哈密顿环排列，保证初始状态安全。
        function resetGame() {
            cycle = buildHamiltonianCycle();
            order = buildOrderMap(cycle);
            snake = [];
            for (let i = START_LENGTH - 1; i >= 0; i--) {
                snake.push({ ...cycle[i] });
            }
            food = createFood();
            steps = 0;
            finished = false;
            running = true;
            lastStrategy = 'cycle';
            lastDirection = null;
            recentHeads = [];
            activePlan = [];
            plannedFoodKey = '';
            planRetryStep = 0;
            toggleBtn.textContent = '暂停';
            syncStats();
            draw();
            startTimer();
        }

        // 生成不在蛇身上的随机食物。
        function createFood() {
            const occupied = new Set(snake.map(keyOf));
            const free = [];
            for (let y = 0; y < ROWS; y++) {
                for (let x = 0; x < COLS; x++) {
                    const point = { x, y };
                    if (!occupied.has(keyOf(point))) free.push(point);
                }
            }
            if (free.length === 0) return null;
            return free[Math.floor(Math.random() * free.length)];
        }

        // 把坐标转换为集合 key。
        function keyOf(point) {
            return point.x + ',' + point.y;
        }

        // 计算从 from 沿哈密顿环前进到 to 的距离。
        function forwardDistance(fromOrder, toOrder) {
            return (toOrder - fromOrder + TOTAL) % TOTAL;
        }

        // 获取蛇头四邻域候选移动。
        function neighborMoves(head) {
            return [
                { x: head.x + 1, y: head.y, dir: 'R' },
                { x: head.x - 1, y: head.y, dir: 'L' },
                { x: head.x, y: head.y - 1, dir: 'U' },
                { x: head.x, y: head.y + 1, dir: 'D' }
            ].filter(point => point.x >= 0 && point.x < COLS && point.y >= 0 && point.y < ROWS);
        }

        // 判断一步移动是否仍保持哈密顿安全顺序，不允许蛇头越过尾巴。
        function isHamiltonianSafeMove(point, willEat) {
            const headOrder = order[snake[0].y][snake[0].x];
            const tail = snake[snake.length - 1];
            const tailOrder = order[tail.y][tail.x];
            const pointOrder = order[point.y][point.x];
            const gapToTail = forwardDistance(headOrder, tailOrder);
            const advance = forwardDistance(headOrder, pointOrder);
            if (!willEat && point.x === tail.x && point.y === tail.y) return true;
            return advance > 0 && advance < gapToTail;
        }

        // 判断候选点是否撞到蛇身；非进食时允许走到当前尾巴。
        function isBodyBlocked(point, willEat) {
            const tail = snake[snake.length - 1];
            return snake.some(segment => {
                if (!willEat && segment.x === tail.x && segment.y === tail.y) return false;
                return segment.x === point.x && segment.y === point.y;
            });
        }

        // 判断两个坐标是否是同一格。
        function isSameCell(a, b) {
            return a && b && a.x === b.x && a.y === b.y;
        }

        // 计算两个坐标之间的曼哈顿距离。
        function manhattan(a, b) {
            return Math.abs(a.x - b.x) + Math.abs(a.y - b.y);
        }

        // 复制蛇身状态，供路线模拟使用。
        function cloneSnakeState(body) {
            return body.map(segment => ({ x: segment.x, y: segment.y }));
        }

        // 判断模拟状态下候选点是否撞到蛇身；非进食时允许走到当前尾巴。
        function isBodyBlockedInState(body, point, willEat) {
            const tail = body[body.length - 1];
            return body.some(segment => {
                if (!willEat && isSameCell(segment, tail)) return false;
                return isSameCell(segment, point);
            });
        }

        // 判断模拟状态下的一步移动是否仍在哈密顿安全窗口内。
        function isHamiltonianSafeMoveInState(body, point, willEat) {
            const head = body[0];
            const tail = body[body.length - 1];
            const headOrder = order[head.y][head.x];
            const tailOrder = order[tail.y][tail.x];
            const pointOrder = order[point.y][point.x];
            const gapToTail = forwardDistance(headOrder, tailOrder);
            const advance = forwardDistance(headOrder, pointOrder);
            if (!willEat && isSameCell(point, tail)) return true;
            return advance > 0 && advance < gapToTail;
        }

        // 获取模拟状态下所有安全邻居，可选限制为不能越过当前食物。
        function safeMovesForState(body, targetFood, limitToFood) {
            const head = body[0];
            const headOrder = order[head.y][head.x];
            const foodOrder = targetFood ? order[targetFood.y][targetFood.x] : headOrder;
            const foodDistance = targetFood ? forwardDistance(headOrder, foodOrder) : TOTAL;

            return neighborMoves(head).filter(point => {
                const willEat = isSameCell(point, targetFood);
                const advance = forwardDistance(headOrder, order[point.y][point.x]);
                if (limitToFood && targetFood && advance > foodDistance) return false;
                return !isBodyBlockedInState(body, point, willEat)
                    && isHamiltonianSafeMoveInState(body, point, willEat);
            });
        }

        // 在模拟蛇身上推进一步，返回新的蛇身和是否吃到食物。
        function simulateMoveInState(body, point, targetFood) {
            const ate = isSameCell(point, targetFood);
            const nextBody = [{ x: point.x, y: point.y }, ...cloneSnakeState(body)];
            if (!ate) nextBody.pop();
            return { body: nextBody, ate };
        }

        // 判断模拟状态下蛇头是否还能连通到尾巴，这是吃后继续安全移动的底线。
        function canReachTailInState(body) {
            const head = body[0];
            const tail = body[body.length - 1];
            const blocked = new Set(body.map(keyOf));
            blocked.delete(keyOf(head));
            blocked.delete(keyOf(tail));

            const queue = [head];
            const seen = new Set([keyOf(head)]);
            while (queue.length > 0) {
                const current = queue.shift();
                if (isSameCell(current, tail)) return true;
                for (const next of neighborMoves(current)) {
                    const key = keyOf(next);
                    if (!seen.has(key) && !blocked.has(key)) {
                        seen.add(key);
                        queue.push(next);
                    }
                }
            }
            return false;
        }

        // 估算模拟状态下蛇头可活动空间，避免短路线吃完后进入小封闭区。
        function reachableSpaceForState(body) {
            const head = body[0];
            const tail = body[body.length - 1];
            const blocked = new Set(body.map(keyOf));
            blocked.delete(keyOf(head));
            blocked.delete(keyOf(tail));

            const queue = [head];
            const seen = new Set([keyOf(head)]);
            while (queue.length > 0) {
                const current = queue.shift();
                for (const next of neighborMoves(current)) {
                    const key = keyOf(next);
                    if (!seen.has(key) && !blocked.has(key)) {
                        seen.add(key);
                        queue.push(next);
                    }
                }
            }
            return seen.size;
        }

        // 验证吃到食物后的状态是否仍有逃生余量。
        function isHealthyAfterEating(body) {
            if (body.length >= TOTAL) return true;
            if (!canReachTailInState(body)) return false;
            const freeCells = TOTAL - body.length;
            const reachable = reachableSpaceForState(body);
            const required = Math.min(freeCells + 1, Math.max(5, Math.floor((freeCells + 1) * 0.35)));
            return reachable >= required;
        }

        // 给搜索队列中的节点排序，随机扰动会让不同局生成不同候选路线。
        function rankPlanSearchNode(path, body, move, attempt) {
            const head = body[0];
            const distance = food ? manhattan(head, food) : 0;
            const lastMove = path[path.length - 2];
            const turnBias = lastMove && lastMove.dir !== move.dir ? (attempt % 2 === 0 ? -0.8 : 0.4) : 0;
            const recentPenalty = recentHeads.includes(keyOf(head)) ? 2.2 : 0;
            const straightBias = lastDirection && path.length === 1 && move.dir === lastDirection ? -0.4 : 0;
            return path.length
                + distance * (1 + (attempt % 4) * 0.22)
                + turnBias
                + recentPenalty
                + straightBias
                + Math.random() * (2 + attempt % 5);
        }

        // 单次搜索一批到食物的候选路线，搜索过程会同步模拟蛇身移动。
        function searchPlanAttempt(attempt) {
            if (!food) return [];
            const startBody = cloneSnakeState(snake);
            const startHead = startBody[0];
            const foodDistance = forwardDistance(order[startHead.y][startHead.x], order[food.y][food.x]);
            const maxDepth = Math.max(1, Math.min(foodDistance, manhattan(startHead, food) + 48));
            const open = [{ body: startBody, path: [], rank: 0 }];
            const found = [];
            const visited = new Map();
            let searched = 0;

            while (open.length > 0 && searched < MAX_SEARCH_NODES && found.length < 2) {
                open.sort((a, b) => a.rank - b.rank);
                const node = open.shift();
                searched++;

                for (const move of safeMovesForState(node.body, food, true)) {
                    const nextState = simulateMoveInState(node.body, move, food);
                    const nextPath = [...node.path, { x: move.x, y: move.y, dir: move.dir }];
                    if (nextPath.length > maxDepth) continue;

                    if (nextState.ate) {
                        if (isHealthyAfterEating(nextState.body)) {
                            found.push({ path: nextPath, body: nextState.body });
                        }
                        continue;
                    }

                    const headKey = keyOf(nextState.body[0]);
                    const tailKey = keyOf(nextState.body[nextState.body.length - 1]);
                    const visitKey = headKey + '|' + tailKey + '|' + (nextPath.length % 17);
                    if (visited.has(visitKey) && visited.get(visitKey) <= nextPath.length) continue;
                    visited.set(visitKey, nextPath.length);
                    open.push({
                        body: nextState.body,
                        path: nextPath,
                        rank: rankPlanSearchNode(nextPath, nextState.body, move, attempt)
                    });
                }
            }

            return found;
        }

        // 收集并去重多次搜索得到的路线候选。
        function collectFoodPlans() {
            const plans = [];
            const seen = new Set();
            for (let attempt = 0; attempt < PLAN_ATTEMPTS && plans.length < MAX_PLAN_CANDIDATES; attempt++) {
                for (const plan of searchPlanAttempt(attempt)) {
                    const signature = plan.path.map(keyOf).join(';');
                    if (!seen.has(signature)) {
                        seen.add(signature);
                        plans.push(plan);
                    }
                }
            }
            return plans;
        }

        // 统计路线中的转向次数，适度奖励有变化的路线。
        function countTurns(path) {
            let turns = 0;
            for (let i = 1; i < path.length; i++) {
                if (path[i].dir !== path[i - 1].dir) turns++;
            }
            return turns;
        }

        // 给完整路线打分：短路线优先，安全空间和路线变化作为次级因素。
        function scorePlan(plan) {
            const head = snake[0];
            const cycleDistance = food ? forwardDistance(order[head.y][head.x], order[food.y][food.x]) : 0;
            const savedSteps = Math.max(0, cycleDistance - plan.path.length);
            const safetySpace = reachableSpaceForState(plan.body);
            const repeatPenalty = plan.path.some(point => recentHeads.includes(keyOf(point))) ? 8 : 0;
            return -plan.path.length * 10
                + Math.min(savedSteps, 55) * 1.1
                + Math.min(safetySpace, 70) * 0.3
                + Math.min(countTurns(plan.path), 8) * 1.3
                + Math.random() * 18
                - repeatPenalty;
        }

        // 在高分路线中加权随机选择一条，避免永远只走同一条最短路线。
        function pickWeightedPlan(plans) {
            const ranked = plans
                .map(plan => ({ ...plan, score: scorePlan(plan) }))
                .sort((a, b) => b.score - a.score);
            const bestLength = Math.min(...ranked.map(plan => plan.path.length));
            const shortlist = ranked
                .filter(plan => plan.path.length <= bestLength + 8)
                .slice(0, 5);
            const minScore = Math.min(...shortlist.map(plan => plan.score));
            const weights = shortlist.map(plan => Math.exp((plan.score - minScore) / 16));
            const totalWeight = weights.reduce((sum, value) => sum + value, 0);
            let cursor = Math.random() * totalWeight;
            for (let i = 0; i < shortlist.length; i++) {
                cursor -= weights[i];
                if (cursor <= 0) return shortlist[i];
            }
            return shortlist[0];
        }

        // 给一步捷径打分，只在完整路线暂时不可用时使用。
        function scoreImmediateShortcut(point) {
            const head = snake[0];
            const pointOrder = order[point.y][point.x];
            const foodOrder = order[food.y][food.x];
            const headOrder = order[head.y][head.x];
            const advance = forwardDistance(headOrder, pointOrder);
            const remainCycle = forwardDistance(pointOrder, foodOrder);
            const foodDistance = manhattan(point, food);
            const space = reachableSpaceForState(simulateMoveInState(snake, point, food).body);
            const turnBonus = lastDirection && point.dir !== lastDirection ? 2 : 0;
            return advance * 0.9
                - remainCycle * 0.12
                - foodDistance * 5
                + Math.min(space, 50) * 0.2
                + turnBonus
                + Math.random() * 8;
        }

        // 挑选一个当前就能执行的安全捷径，保证不越过食物。
        function pickImmediateShortcut() {
            if (!isFoodSafelyAhead()) return null;
            const head = snake[0];
            const headOrder = order[head.y][head.x];
            const foodOrder = order[food.y][food.x];
            const foodDistance = forwardDistance(headOrder, foodOrder);
            const candidates = safeMovesForState(snake, food, true)
                .filter(point => forwardDistance(headOrder, order[point.y][point.x]) <= foodDistance)
                .filter(point => {
                    if (!isSameCell(point, food)) return true;
                    return isHealthyAfterEating(simulateMoveInState(snake, point, food).body);
                });
            const ranked = candidates
                .map(point => ({ point, score: scoreImmediateShortcut(point) }))
                .sort((a, b) => b.score - a.score);
            const selected = ranked[0] && ranked[0].point;
            if (!selected) return null;
            const advance = forwardDistance(headOrder, order[selected.y][selected.x]);
            return advance > 1 || isSameCell(selected, food) ? selected : null;
        }

        // 判断缓存路线的下一步是否仍然可用。
        function isActivePlanUsable() {
            if (!food || plannedFoodKey !== keyOf(food) || activePlan.length === 0) return false;
            const head = snake[0];
            const next = activePlan[0];
            if (manhattan(head, next) !== 1) return false;
            const headOrder = order[head.y][head.x];
            const foodDistance = forwardDistance(headOrder, order[food.y][food.x]);
            const advance = forwardDistance(headOrder, order[next.y][next.x]);
            const willEat = isSameCell(next, food);
            return advance <= foodDistance
                && !isBodyBlockedInState(snake, next, willEat)
                && isHamiltonianSafeMoveInState(snake, next, willEat);
        }

        // 消费缓存路线的一步，并同步策略标签。
        function takePlannedMove() {
            const head = snake[0];
            const next = activePlan.shift();
            const advance = forwardDistance(order[head.y][head.x], order[next.y][next.x]);
            lastStrategy = isSameCell(next, food) ? 'eat' : (advance > 1 ? 'smart' : 'plan');
            return next;
        }

        // 生成新的食物路线计划，并缓存下来。
        function buildActivePlan() {
            const plans = collectFoodPlans();
            if (plans.length === 0) {
                planRetryStep = steps + 6;
                return false;
            }
            const selected = pickWeightedPlan(plans);
            const head = snake[0];
            const cycleDistance = forwardDistance(order[head.y][head.x], order[food.y][food.x]);
            const firstAdvance = forwardDistance(order[head.y][head.x], order[selected.path[0].y][selected.path[0].x]);
            if (cycleDistance - selected.path.length < 4 && firstAdvance <= 1 && !isSameCell(selected.path[0], food)) {
                planRetryStep = steps + 6;
                return false;
            }
            activePlan = selected.path.map(point => ({ ...point }));
            plannedFoodKey = keyOf(food);
            return true;
        }

        // 判断当前食物是否位于蛇头和蛇尾之间的安全追击窗口。
        function isFoodSafelyAhead() {
            if (!food) return false;
            const head = snake[0];
            const tail = snake[snake.length - 1];
            const headOrder = order[head.y][head.x];
            const tailOrder = order[tail.y][tail.x];
            const foodOrder = order[food.y][food.x];
            const gapToTail = forwardDistance(headOrder, tailOrder);
            const foodDistance = forwardDistance(headOrder, foodOrder);
            return foodDistance > 0 && foodDistance < gapToTail;
        }

        // 选择下一步：优先执行已验证路线，找不到路线时回到哈密顿环兜底。
        function chooseNextMove() {
            const head = snake[0];
            const headOrder = order[head.y][head.x];
            const cycleNext = { ...cycle[(headOrder + 1) % TOTAL], dir: directionBetween(head, cycle[(headOrder + 1) % TOTAL]) };

            if (isActivePlanUsable()) return takePlannedMove();
            if (isFoodSafelyAhead() && steps >= planRetryStep && buildActivePlan() && isActivePlanUsable()) {
                return takePlannedMove();
            }
            const shortcut = pickImmediateShortcut();
            if (shortcut) {
                lastStrategy = isSameCell(shortcut, food) ? 'eat' : 'smart';
                return shortcut;
            }

            activePlan = [];
            plannedFoodKey = '';
            lastStrategy = 'cycle';
            return cycleNext;
        }

        // 根据两个相邻格子推导方向标签。
        function directionBetween(from, to) {
            if (to.x > from.x) return 'R';
            if (to.x < from.x) return 'L';
            if (to.y > from.y) return 'D';
            return 'U';
        }

        // 推进一帧游戏，吃满全图后停止。
        function stepGame() {
            if (!running || finished) return;

            const next = chooseNextMove();
            const ate = food && next.x === food.x && next.y === food.y;
            snake.unshift({ x: next.x, y: next.y });
            if (!ate) {
                snake.pop();
            } else if (snake.length === TOTAL) {
                finished = true;
                running = false;
                food = null;
                activePlan = [];
                plannedFoodKey = '';
                planRetryStep = 0;
                toggleBtn.textContent = '已完成';
            } else {
                food = createFood();
                activePlan = [];
                plannedFoodKey = '';
                planRetryStep = 0;
            }

            steps++;
            lastDirection = next.dir || directionBetween(snake[1], snake[0]);
            recentHeads.push(keyOf(snake[0]));
            if (recentHeads.length > 18) recentHeads.shift();

            syncStats();
            draw();
        }

        // 同步顶部实时状态。
        function syncStats() {
            stepsEl.textContent = String(steps);
            lengthEl.textContent = String(snake.length);
            strategyEl.textContent = finished ? 'full' : lastStrategy;
            progressEl.textContent = Math.round(snake.length / TOTAL * 100) + '%';
        }

        // 启动固定频率移动计时器。
        function startTimer() {
            if (timer) clearInterval(timer);
            timer = setInterval(stepGame, TICK_MS);
        }

        // 绘制棋盘、蛇、食物和哈密顿安全路径提示。
        function draw() {
            const width = canvas.width;
            const height = canvas.height;
            const cell = Math.floor(Math.min(width / COLS, height / ROWS));
            const boardWidth = cell * COLS;
            const boardHeight = cell * ROWS;
            const offsetX = (width - boardWidth) / 2;
            const offsetY = (height - boardHeight) / 2;

            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = '#1f2b20';
            ctx.fillRect(0, 0, width, height);

            drawGrid(offsetX, offsetY, cell);
            drawCycleHint(offsetX, offsetY, cell);
            if (food) drawFood(food, offsetX, offsetY, cell);
            drawSnake(offsetX, offsetY, cell);
            if (finished) drawFinished(width, height);
        }

        // 绘制网格背景。
        function drawGrid(offsetX, offsetY, cell) {
            ctx.save();
            ctx.strokeStyle = 'rgba(255,255,255,0.06)';
            ctx.lineWidth = 1;
            for (let x = 0; x <= COLS; x++) {
                ctx.beginPath();
                ctx.moveTo(offsetX + x * cell, offsetY);
                ctx.lineTo(offsetX + x * cell, offsetY + ROWS * cell);
                ctx.stroke();
            }
            for (let y = 0; y <= ROWS; y++) {
                ctx.beginPath();
                ctx.moveTo(offsetX, offsetY + y * cell);
                ctx.lineTo(offsetX + COLS * cell, offsetY + y * cell);
                ctx.stroke();
            }
            ctx.restore();
        }

        // 轻微标记哈密顿兜底路径方向，帮助观察安全底座但不喧宾夺主。
        function drawCycleHint(offsetX, offsetY, cell) {
            ctx.save();
            ctx.strokeStyle = 'rgba(247,210,106,0.08)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            cycle.forEach((point, index) => {
                const x = offsetX + point.x * cell + cell / 2;
                const y = offsetY + point.y * cell + cell / 2;
                if (index === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.closePath();
            ctx.stroke();
            ctx.restore();
        }

        // 绘制食物。
        function drawFood(point, offsetX, offsetY, cell) {
            const x = offsetX + point.x * cell;
            const y = offsetY + point.y * cell;
            ctx.save();
            ctx.fillStyle = '#f05a3b';
            ctx.beginPath();
            ctx.arc(x + cell / 2, y + cell / 2, cell * 0.28, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#ffd3a3';
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.restore();
        }

        // 绘制蛇身，头部和尾部用不同亮度区分。
        function drawSnake(offsetX, offsetY, cell) {
            snake.forEach((segment, index) => {
                const x = offsetX + segment.x * cell + 2;
                const y = offsetY + segment.y * cell + 2;
                const radius = Math.max(5, cell * 0.18);
                ctx.fillStyle = index === 0 ? '#f7d26a' : colorForBody(index);
                roundRect(x, y, cell - 4, cell - 4, radius);
                ctx.fill();
                if (index === 0) {
                    ctx.fillStyle = '#1c1f1b';
                    ctx.beginPath();
                    ctx.arc(x + cell * 0.62, y + cell * 0.34, 2.4, 0, Math.PI * 2);
                    ctx.arc(x + cell * 0.62, y + cell * 0.64, 2.4, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }

        // 根据蛇身位置生成渐变色。
        function colorForBody(index) {
            const t = index / Math.max(1, snake.length - 1);
            const green = Math.round(168 - t * 60);
            return 'rgb(68,' + green + ',92)';
        }

        // 绘制圆角矩形路径。
        function roundRect(x, y, width, height, radius) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
        }

        // 绘制吃满全图后的完成提示。
        function drawFinished(width, height) {
            ctx.save();
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(0, 0, width, height);
            ctx.fillStyle = '#f7d26a';
            ctx.font = 'bold 42px Microsoft YaHei, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('已吃满全图', width / 2, height / 2);
            ctx.restore();
        }

        // 切换自动运行状态。
        function toggleRunning() {
            if (finished) return;
            running = !running;
            toggleBtn.textContent = running ? '暂停' : '继续';
        }

        toggleBtn.addEventListener('click', toggleRunning);
        restartBtn.addEventListener('click', resetGame);
        resetGame();
    </script>
</body>
</html>
